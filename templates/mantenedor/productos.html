<!DOCTYPE html>
<html>
<head>
    <title>Lista de Productos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .table thead {
            background: #0d6efd;
            color: white;
        }
    </style>
</head>
<body>

<div class="container mt-5">

    <div class="card p-4">

        <div class="d-flex justify-content-between align-items-center mb-3">
              <h3 class="me-3 mb-0">📦 Lista de Productos</h3>
    
    <!-- DERECHA -->
    <div class="d-flex gap-2">

    <a href="/mantenedor/productos/nuevo" class="btn btn-success me-2">
        ➕ Nuevo Producto
    </a>

    </div>
</div>


        <div class="table-responsive">
            <table class="table table-hover">

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Código</th>
                        <th>Familia</th>
                        <th>Descripción</th>
                        <th>Modelo</th>
                        <th>Marca</th>
                        <th>Presentación</th>
                        <th>Peso</th>
                        <th>Transporte</th>
                    </tr>
                </thead>

                <tbody>
                    {% for p in productos %}
                    <tr>
                        <td>{{ p.id }}</td>
                        <td><strong>{{ p.codigo }}</strong></td>
                        <td>{{ p.familia }}</td>
                        <td>{{ p.descripcion }}</td>
                        <td>{{ p.modelo }}</td>
                        <td>{{ p.marca }}</td>
                        <td>{{ p.unidad }}</td>
                        <td>{{ p.peso }}</td>
                        <td>{{ p.transporte }}</td>
                        
                        
                      
                    </tr>
                    {% endfor %}
                </tbody>

            </table>
        </div>

    </div>

</div>

</body>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const input = document.getElementById('fileInput');
    if (input) {
        input.addEventListener('change', function() {
            this.form.submit();
        });
    }
});
</script>
</html>
